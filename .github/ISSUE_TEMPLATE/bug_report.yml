name: Bug report
description: Report a reproducible app bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for someone else to reproduce the issue.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: The app showed..., but I expected...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: v0.0.0 or commit SHA
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: macOS 15.5
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: Mac chip
      options:
        - Apple Silicon
        - Intel
        - Unknown
  - type: textarea
    id: wallpaper
    attributes:
      label: Wallpaper/project details
      description: Include file type, project type, or Workshop project folder details when relevant. Do not upload copyrighted creator assets unless you have permission.
      placeholder: MP4 / WebM / web wallpaper / scene.pkg / image...
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or error text
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I am not asking for Steam authentication bypass, DRM bypass, or Workshop downloading.
          required: true

